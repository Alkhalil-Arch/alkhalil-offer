<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شركة الخليل - عرض السعر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #525659; font-family: 'Cairo', sans-serif; display: flex; flex-direction: column; align-items: center; }
        #control-panel { display: none; background: #2c3e50; color: white; padding: 20px; width: 1000px; margin: 20px 0; border-radius: 10px; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        
        @media print { 
            #control-panel { display: none !important; } 
            body { background: none; }
            .page { margin: 0 !important; box-shadow: none !important; page-break-after: always !important; width: 297mm !important; height: 210mm !important; }
        }

        .page { position: relative; width: 297mm; height: 210mm; background-color: white; margin-bottom: 10px; overflow: hidden; }
        .slide-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; z-index: 1; }
        .content-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        /* طبقات البيانات */
        .project-info { position: absolute; color: #58595b; font-weight: 700; white-space: nowrap; }
        .excel-value { position: absolute; color: #be1e2d; font-weight: bold; text-align: center; width: 28mm; font-size: 16px; }

        /* إحداثيات النصوص */
        #display-project-name { top: 167.9mm; right: 109mm; font-size: 25px; } 
        #display-client-name { top: 111.2mm; right: 40.8mm; text-align: center; width: 40mm; font-size: 18px; }
        #display-date { top: 111.7mm; right: 185.5mm; text-align: center; width: 40mm; font-size: 18px; }

        #val0 { top: 49.5mm; right: 243mm; } #val1 { top: 62.8mm; right: 243mm; } 
        #val2 { top: 83.5mm; right: 243mm; } #val3 { top: 97.2mm; right: 243mm; } 
        #val4 { top: 112.5mm; right: 243mm; } #val5 { top: 125.8mm; right: 243mm; } 
        #val6 { top: 139.5mm; right: 243mm; }

        .input-group { display: flex; flex-direction: column; }
        .input-group label { margin-bottom: 5px; font-size: 12px; color: #bdc3c7; }
        .input-group input, .input-group textarea { padding: 8px; border-radius: 5px; border: 1px solid #34495e; font-family: 'Cairo'; font-size: 14px; }
        .wa-btn { grid-column: span 2; background: #25d366; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="control-panel">
        <div class="input-group"><label>نوع المشروع:</label><input type="text" id="p-name" value="مشروع سكني" oninput="updateAll()"></div>
        <div class="input-group"><label>اسم العميل:</label><input type="text" id="c-name" oninput="updateAll()"></div>
        <div class="input-group"><label>اسم الموظف:</label><input type="text" id="e-name" value="الوليد الشهري" oninput="updateAll()"></div>
        <div class="input-group"><label>رقم الجوال:</label><input type="text" id="phone" placeholder="9665xxxxxxxx"></div>
        <div class="input-group" style="grid-column: span 2;"><label>معاينة الرسالة:</label><textarea id="wa-msg" readonly></textarea></div>
        <div class="input-group"><label>مساحة الأرض:</label><input type="number" id="l-area" value="1000" oninput="updateAll()"></div>
        <div class="input-group"><label>نسبة الأرضي %:</label><input type="number" id="p-g" value="60" oninput="updateAll()"></div>
        <div class="input-group"><label>نسبة الأول %:</label><input type="number" id="p-f" value="60" oninput="updateAll()"></div>
        <div class="input-group"><label>نسبة الملحق %:</label><input type="number" id="p-r" value="50" oninput="updateAll()"></div>
        <div class="input-group"><label>ملحق خارجي %:</label><input type="number" id="p-e" value="10" oninput="updateAll()"></div>
        <div class="input-group"><label>القبو:</label><input type="number" id="b-area" value="0" oninput="updateAll()"></div>
        <button class="wa-btn" style="grid-column: span 4;" onclick="sendWhatsApp()">إرسال العرض (PDF) عبر واتساب</button>
    </div>

    <div id="pages-container"></div>

    <script>
        const container = document.getElementById('pages-container');
        let currentTotal = 0;

        for (let i = 1; i <= 15; i++) {
            let content = "";
            if (i === 1) content = `<div id="display-project-name" class="project-info">...</div>`;
            if (i === 2) content = `<div id="display-client-name" class="project-info">...</div><div id="display-date" class="project-info">...</div>`;
            if (i === 4) content = `<div id="val0" class="excel-value"></div><div id="val1" class="excel-value"></div><div id="val2" class="excel-value"></div><div id="val3" class="excel-value"></div><div id="val4" class="excel-value"></div><div id="val5" class="excel-value"></div><div id="val6" class="excel-value"></div>`;
            container.innerHTML += `<div class="page"><img src="Slide${i}.jpg" class="slide-img" onerror="this.src='Slide${i}.JPG'"><div class="content-layer">${content}</div></div>`;
        }

        function updateAll() {
            const land = parseFloat(document.getElementById('l-area').value) || 0;
            const pg = (parseFloat(document.getElementById('p-g').value) || 0) / 100;
            const pf = (parseFloat(document.getElementById('p-f').value) || 0) / 100;
            const pr = (parseFloat(document.getElementById('p-r').value) || 0) / 100;
            const pe = (parseFloat(document.getElementById('p-e').value) || 0) / 100;
            const ba = parseFloat(document.getElementById('b-area').value) || 0;

            const resG = land * pg; const resF = land * pf; const resR = resF * pr; const resE = land * pe;
            currentTotal = Math.round(resG + resF + resR + resE + ba);

            const name = document.getElementById('c-name').value || "عميلنا العزيز";
            const proj = document.getElementById('p-name').value || "مشروعك";
            const emp = document.getElementById('e-name').value || "الوليد";
            const fDate = new Date().toLocaleDateString('en-GB');
            const greet = (new Date().getHours() < 12) ? "يسعد صباحك" : "يسعد مساك";

            document.getElementById('display-date').innerText = fDate;
            document.getElementById('display-client-name').innerText = name;
            document.getElementById('display-project-name').innerText = proj;

            document.getElementById('wa-msg').value = `أهلاً بك أ. ${name} .. ${greet} 🌸\n\nمعك ${emp} من شركة الخليل.. حبيت أتواصل معك وأرسل لك عرض السعر المبدئي لمشروعكم المميز (${proj}).\n\nتلاقي في الرابط أدناه ملف PDF يوضح لك كل التفاصيل. 😊🌷\n\n🔗 رابط ملف العرض: `;

            const setV = (id, val) => { if(document.getElementById(id)) document.getElementById(id).innerText = Math.round(val).toLocaleString() + " m2"; };
            setV('val0', land); setV('val2', resG); setV('val3', resF); setV('val4', resR); setV('val5', resE); setV('val6', ba); setV('val1', currentTotal);
        }

        function sendWhatsApp() {
            const phone = document.getElementById('phone').value;
            const baseURL = "https://alkhalil-arch.github.io/alkhalil-offer/";
            
            // قمنا بإعادة n (الاسم) و p (المشروع) للرابط ليظهرا في الملف
            const n = encodeURIComponent(document.getElementById('c-name').value);
            const p = encodeURIComponent(document.getElementById('p-name').value);
            const l = document.getElementById('l-area').value;
            const g = document.getElementById('p-g').value;
            const f = document.getElementById('p-f').value;
            const r = document.getElementById('p-r').value;
            const e = document.getElementById('p-e').value;
            const b = document.getElementById('b-area').value;

            const offerLink = `${baseURL}?n=${n}&p=${p}&l=${l}&g=${g}&f=${f}&r=${r}&e=${e}&b=${b}`;
            const pdfURL = `https://api.html2pdf.app/v1/generate?url=${encodeURIComponent(offerLink)}&apiKey=public&format=A4&landscape=true`;
            
            window.location.href = `whatsapp://send?phone=${phone}&text=${encodeURIComponent(document.getElementById('wa-msg').value + pdfURL)}`;
        }

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('admin')) document.getElementById('control-panel').style.display = 'grid';
            if (params.has('l')) {
                document.getElementById('c-name').value = params.get('n') || "";
                document.getElementById('p-name').value = params.get('p') || "";
                document.getElementById('l-area').value = params.get('l');
                document.getElementById('p-g').value = params.get('g');
                document.getElementById('p-f').value = params.get('f');
                document.getElementById('p-r').value = params.get('r');
                document.getElementById('p-e').value = params.get('e');
                document.getElementById('b-area').value = params.get('b');
                updateAll();
            }
        }
        updateAll();
    </script>
</body>
</html>
