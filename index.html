<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شركة الخليل - عرض السعر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #525659; font-family: 'Cairo', sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* إخفاء لوحة التحكم افتراضياً */
        #control-panel { 
            display: none; background: #2c3e50; color: white; padding: 20px; width: 1000px; 
            margin: 20px 0; border-radius: 10px; grid-template-columns: repeat(4, 1fr); gap: 15px;
        }

        @media print { #control-panel { display: none !important; } }

        .page { position: relative; width: 297mm; height: 210mm; background-color: white; margin-bottom: 10px; overflow: hidden; }
        .slide-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; z-index: 1; }
        .content-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .project-info { position: absolute; color: #58595b; font-weight: 700; white-space: nowrap; }
        .excel-value { position: absolute; color: #be1e2d; font-weight: bold; text-align: center; width: 28mm; font-size: 16px; }

        /* الإحداثيات */
        #display-project-name { top: 167.9mm; right: 109mm; font-size: 25px; } 
        #display-client-name { top: 111.2mm; right: 40.8mm; text-align: center; width: 40mm; font-size: 18px; }
        #display-date { top: 111.7mm; right: 185.5mm; text-align: center; width: 40mm; font-size: 18px; }
        #val0 { top: 49.5mm; right: 243mm; } #val1 { top: 62.8mm; right: 243mm; } 
        #val2 { top: 83.5mm; right: 243mm; } #val3 { top: 97.2mm; right: 243mm; } 
        #val4 { top: 112.5mm; right: 243mm; } #val5 { top: 125.8mm; right: 243mm; } #val6 { top: 139.5mm; right: 243mm; }

        .input-group { display: flex; flex-direction: column; }
        .input-group label { margin-bottom: 5px; font-size: 12px; color: #bdc3c7; }
        .input-group input, .input-group textarea { padding: 8px; border-radius: 5px; border: 1px solid #34495e; font-family: 'Cairo'; font-size: 14px; }
        .input-group textarea { resize: vertical; min-height: 100px; grid-column: span 2; background: #fdfdfd; color: #2c3e50; }
        .wa-btn { grid-column: span 2; background: #25d366; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="control-panel">
        <div class="input-group"><label>نوع المشروع:</label><input type="text" id="project-name" value="مشروع سكني" oninput="updateAll()"></div>
        <div class="input-group"><label>اسم العميل:</label><input type="text" id="client-name" oninput="updateAll()"></div>
        <div class="input-group"><label>اسم الموظف:</label><input type="text" id="employee-name" value="الوليد" oninput="updateAll()"></div>
        <div class="input-group"><label>رقم الجوال:</label><input type="text" id="client-phone" placeholder="9665xxxxxxxx"></div>
        <div class="input-group" style="grid-column: span 2;"><label>معاينة الرسالة:</label><textarea id="whatsapp-message" readonly></textarea></div>
        <div class="input-group"><label>مساحة الأرض:</label><input type="number" id="input-land-area" value="1000" oninput="updateAll()"></div>
        <div class="input-group"><label>نسبة الأرضي:</label><input type="number" id="perc-ground" value="60" oninput="updateAll()"></div>
        <div class="input-group"><label>نسبة الأول:</label><input type="number" id="perc-first" value="60" oninput="updateAll()"></div>
        <div class="input-group"><label>نسبة الملحق:</label><input type="number" id="perc-roof" value="50" oninput="updateAll()"></div>
        <div class="input-group"><label>ملحق خارجي:</label><input type="number" id="perc-ext" value="10" oninput="updateAll()"></div>
        <div class="input-group"><label>القبو:</label><input type="number" id="input-basement" value="0" oninput="updateAll()"></div>
        <button class="wa-btn" onclick="sendWhatsApp()">إرسال العرض عبر واتساب</button>
    </div>

    <div id="pages-container"></div>

    <script>
        const container = document.getElementById('pages-container');
        let currentTotal = 0;

        for (let i = 1; i <= 15; i++) {
            let content = "";
            if (i === 1) content = `<div id="display-project-name" class="project-info">...</div>`;
            if (i === 2) content = `<div id="display-client-name" class="project-info">...</div><div id="display-date" class="project-info">...</div>`;
            if (i === 4) content = `<div id="val0" class="excel-value"></div><div id="val1" class="excel-value"></div><div id="val2" class="excel-value"></div><div id="val3" class="excel-value"></div><div id="val4" class="excel-value"></div><div id="val5" class="excel-value"></div><div id="val6" class="excel-value"></div>`;
            container.innerHTML += `<div class="page"><img src="Slide${i}.jpg" class="slide-img" id="img-slide-${i}" onerror="this.src='Slide${i}.JPG'"><div class="content-layer">${content}</div></div>`;
        }

        function updateAll() {
            const landArea = parseFloat(document.getElementById('input-land-area').value) || 0;
            const pG = (parseFloat(document.getElementById('perc-ground').value) || 0) / 100;
            const pF = (parseFloat(document.getElementById('perc-first').value) || 0) / 100;
            const pR = (parseFloat(document.getElementById('perc-roof').value) || 0) / 100; 
            const pE = (parseFloat(document.getElementById('perc-ext').value) || 0) / 100;
            const bA = parseFloat(document.getElementById('input-basement').value) || 0;

            const resG = landArea * pG; const resF = landArea * pF; const resR = resF * pR; const resE = landArea * pE;
            currentTotal = Math.round(resG + resF + resR + resE + bA);

            const today = new Date();
            const fDate = today.getDate() + '/' + (today.getMonth()+1) + '/' + today.getFullYear();
            const greet = (today.getHours() < 12) ? "يسعد صباحك" : "يسعد مساك";
            
            const name = document.getElementById('client-name').value || "عميلنا العزيز";
            const emp = document.getElementById('employee-name').value || "الوليد";
            const prj = document.getElementById('project-name').value || "مشروعك";

            document.getElementById('display-date').innerText = fDate;
            document.getElementById('display-client-name').innerText = name;
            document.getElementById('display-project-name').innerText = prj;

            const msg = `أهلاً بك أ. ${name} .. ${greet} 🌸\n\nمعك ${emp} من شركة الخليل.. حبيت أتواصل معك وأرسل لك عرض السعر المبدئي لمشروعكم المميز ، والي اشتغلنا عليه بكل اهتمام عشان يناسب تطلعاتكم.\n\nتلاقي في الرابط ملف يوضح لك كل التفاصيل. وبإذن الله ينال رضاكم واستحسانكم.. وإذا فيه أي استفسار أو نقطة حاب نناقشها، لا تتردد أبداً بالتواصل معي، أنا موجود وبخدمتك دائماً. 😊🌷\n\n🔗 رابط العرض: `;
            document.getElementById('whatsapp-message').value = msg;

            const setV = (id, num) => { if(document.getElementById(id)) document.getElementById(id).innerText = Math.round(num).toLocaleString() + " m2"; };
            setV('val0', landArea); setV('val2', resG); setV('val3', resF); setV('val4', resR); setV('val5', resE); setV('val6', bA); setV('val1', currentTotal);
        }

        function sendWhatsApp() {
            const phone = document.getElementById('client-phone').value;
            if(!phone) { alert("أدخل رقم الجوال"); return; }

            const baseURL = "https://alkhalil-arch.github.io/alkhalil-offer/"; 
            // حذفنا الأسماء من الرابط تماماً لتقصيره، نرسل الأرقام فقط
            const l = document.getElementById('input-land-area').value;
            const g = document.getElementById('perc-ground').value;
            const f = document.getElementById('perc-first').value;
            const r = document.getElementById('perc-roof').value;
            const e = document.getElementById('perc-ext').value;
            const b = document.getElementById('input-basement').value;

            const offerLink = `${baseURL}?l=${l}&g=${g}&f=${f}&r=${r}&e=${e}&b=${b}`;
            const fullMsg = document.getElementById('whatsapp-message').value + offerLink;
            window.location.href = `whatsapp://send?phone=${phone}&text=${encodeURIComponent(fullMsg)}`;
        }

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            // إظهار اللوحة فقط للموظف بكلمة admin
            if (params.has('admin')) { document.getElementById('control-panel').style.display = 'grid'; }
            if (params.has('l')) {
                document.getElementById('input-land-area').value = params.get('l');
                document.getElementById('perc-ground').value = params.get('g');
                document.getElementById('perc-first').value = params.get('f');
                document.getElementById('perc-roof').value = params.get('r');
                document.getElementById('perc-ext').value = params.get('e');
                document.getElementById('input-basement').value = params.get('b');
                updateAll();
            }
        }
        updateAll();
    </script>
</body>
</html>
